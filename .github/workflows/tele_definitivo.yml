name: Navegador Definitivo Microsoft
on:
  workflow_dispatch:

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Iniciar Entorno Web
        run: |
          # 1. Levanta el navegador virtual
          docker run -d -p 6080:80 --security-opt seccomp=unconfined dorowu/ubuntu-desktop-lxde-vnc
          
          echo "=========================================================="
          echo "DESCARGANDO COMPONENTE DE MICROSOFT..."
          echo "=========================================================="
          
          # 2. Descarga directa del binario portátil de devtunnel para Linux x64
          curl -sL https://aka.ms/devtunnel-linux-x64-release -o devtunnel
          chmod +x devtunnel
          
          echo "=========================================================="
          echo "GENERANDO ENLACE INDESTRUCTIBLE..."
          echo "=========================================================="
          
          # 3. Arrancar el túnel portátil local
          ./devtunnel host create --allow-anonymous -p 6080
